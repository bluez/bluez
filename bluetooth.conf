<!-- D-Bus configuration for BlueZ with gamepad quirks -->
<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root can own the service name -->
  <policy user="root">
    <allow own="org.bluez"/>
    <allow send_destination="org.bluez"/>
    <allow send_interface="org.bluez.Agent1"/>
    <allow send_interface="org.bluez.AgentManager1"/>
    <allow send_interface="org.bluez.ProfileManager1"/>
  </policy>

  <!-- Allow everyone to interact -->
  <policy context="default">
    <allow send_destination="org.bluez"
           send_interface="org.bluez.DBus.Adapter1"/>
    <allow send_destination="org.bluez"
           send_interface="org.bluez.DBus.Device1"/>
    <allow send_destination="org.bluez"
           send_interface="org.bluez.DBus.DeviceManager1"/>
    <allow send_destination="org.bluez"
           send_interface="org.bluez.DBus.AgentManager1"/>
    <allow send_destination="org.bluez"
           send_interface="org.bluez.DBus.ProfileManager1"/>
    <allow send_destination="org.bluez"
           send_interface="org.freedesktop.DBus.ObjectManager"/>
    <allow send_destination="org.bluez"
           send_interface="org.freedesktop.DBus.Properties"/>
    <allow send_interface="org.freedesktop.DBus.Properties"/>
    <deny send_destination="org.bluez"/>
  </policy>
</busconfig>
